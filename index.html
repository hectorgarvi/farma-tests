<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Farma Tests · Simulador de examen</title>
  <h1>Para Lorena, de parte de Héctor 🤡</h1>
  <script>
    // Aplica el tema guardado antes de pintar para evitar parpadeo.
    try {
      var t = localStorage.getItem("farmaTests:theme");
      if (t === "light") document.documentElement.setAttribute("data-theme", "light");
    } catch (e) {}
  </script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <h1 class="brand">💊 Farma Tests</h1>
    <span class="tagline">Simulador de examen</span>
    <button id="theme-toggle" class="theme-toggle" title="Cambiar tema" aria-label="Cambiar tema claro/oscuro">🌙</button>
  </header>

  <main id="app">
    <!-- Pantalla de inicio -->
    <section id="screen-start" class="screen">
      <div class="subject-tabs" id="subject-tabs" role="tablist"></div>

      <h2>Generar examen</h2>
      <p class="muted">
        Cada examen tiene <strong id="exam-size-label">55</strong> preguntas
        mezclando todos los niveles de dificultad. Las preguntas se eligen al
        azar del banco.
      </p>

      <div class="bank-info" id="bank-info">Cargando banco de preguntas…</div>

      <div class="options-grid">
        <label class="opt-row">
          <input type="checkbox" id="opt-immediate" checked />
          <span>Feedback inmediato (corrige al responder cada pregunta)</span>
        </label>
        <label class="opt-row">
          <input type="checkbox" id="opt-shuffle" checked />
          <span>Barajar el orden de las opciones</span>
        </label>
        <label class="opt-row">
          <input type="checkbox" id="opt-show-difficulty" checked />
          <span>Mostrar la dificultad de cada pregunta</span>
        </label>
        <label class="opt-row">
          <input type="checkbox" id="opt-show-tema" checked />
          <span>Mostrar el tema de cada pregunta</span>
        </label>
        <label class="opt-row hidden" id="row-only-drugs">
          <input type="checkbox" id="opt-only-drugs" />
          <span>Solo preguntas de identificar fármacos</span>
        </label>
        <label class="opt-row">
          <input type="checkbox" id="opt-custom-size" />
          <span>Personalizar el nº de preguntas del examen</span>
        </label>
        <div class="custom-size-wrap hidden" id="custom-size-wrap">
          <input type="number" id="custom-size" min="1" step="1" />
          <span class="muted">preguntas (máx. <span id="custom-size-max">—</span>)</span>
        </div>
      </div>

      <button id="btn-start" class="btn btn-primary" disabled>
        Empezar examen
      </button>
    </section>

    <!-- Pantalla de examen -->
    <section id="screen-exam" class="screen hidden">
      <div class="exam-head">
        <div class="progress-wrap">
          <div class="progress-bar"><div id="progress-fill"></div></div>
          <span id="progress-text" class="muted"></span>
        </div>
        <div class="score-live muted" id="score-live"></div>
        <button id="btn-quit" class="btn btn-quit" title="Salir del examen">
          ✕ Salir
        </button>
      </div>

      <div id="question-card" class="card"></div>

      <div class="exam-nav">
        <button id="btn-prev" class="btn">← Anterior</button>
        <button id="btn-next" class="btn btn-primary">Siguiente →</button>
        <button id="btn-finish" class="btn btn-primary hidden">
          Finalizar examen
        </button>
      </div>
    </section>

    <!-- Pantalla de resultados -->
    <section id="screen-result" class="screen hidden">
      <h2>Resultado</h2>
      <div id="result-summary" class="result-summary"></div>
      <div class="result-actions">
        <button id="btn-review" class="btn">Ver revisión</button>
        <button id="btn-restart" class="btn btn-primary">Nuevo examen</button>
      </div>
      <div id="review-list" class="review-list hidden"></div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
